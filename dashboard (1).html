<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GeoPortal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <!-- Navbar Dashboard -->
    <nav class="bg-slate-900 text-white p-4 flex justify-between px-10 items-center shadow-md">
        <h1 class="font-bold text-lg">📊 Admin Dashboard</h1>
        <div class="flex gap-4 items-center">
            <span id="adminStatus" class="text-xs bg-green-600 text-white px-2 py-1 rounded font-bold hidden">✅ Superadmin Aktif</span>
            
            <select id="filterTipe" class="text-sm bg-slate-800 border border-slate-600 rounded px-2 py-1.5 outline-none text-white cursor-pointer hover:bg-slate-700">
                <option value="semua">Tampilkan Semua Data</option>
                <option value="laporan_member">Hanya Laporan Member</option>
                <option value="laporan_anonim">Hanya Laporan Anonim</option>
            </select>
            
            <a href="index.html" class="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-1.5 rounded transition">Kembali ke Peta</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-8 px-5 space-y-6">
        <!-- Section: Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 border-t-4 border-t-blue-500">
                <p class="text-sm text-slate-500 font-semibold mb-2">Total Laporan Masuk</p>
                <h3 id="totLaporan" class="text-4xl font-bold text-slate-800">0</h3>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 border-t-4 border-t-red-500">
                <p class="text-sm text-slate-500 font-semibold mb-2">Laporan Baru</p>
                <h3 id="totBaru" class="text-4xl font-bold text-red-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 border-t-4 border-t-green-500">
                <p class="text-sm text-slate-500 font-semibold mb-2">Selesai Ditinjau</p>
                <h3 id="totSelesai" class="text-4xl font-bold text-green-600">0</h3>
            </div>
        </div>

        <!-- Section: Chart & Table -->
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
            <!-- Grafik Kiri -->
            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                <h2 class="text-base font-bold text-slate-800 mb-4 border-b pb-2">Grafik Kategori Kriminalitas</h2>
                <div class="relative h-64 w-full">
                    <canvas id="kategoriChart"></canvas>
                </div>
            </div>

            <!-- Tabel Kanan -->
            <div class="lg:col-span-3 bg-white p-6 rounded-lg shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                <h2 class="text-base font-bold text-slate-800 mb-4 border-b pb-2">Data Laporan Terbaru</h2>
                <div class="overflow-y-auto flex-1 h-64 scrollbar-custom">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead class="bg-slate-100 text-slate-600 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th class="p-3 border-b">Pelapor & Wilayah</th>
                                <th class="p-3 border-b">Kategori</th>
                                <th class="p-3 border-b">Status</th>
                                <th class="p-3 border-b text-center">Aksi (Admin)</th>
                            </tr>
                        </thead>
                        <tbody id="tabelLaporan">
                            <!-- Data Table -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/dashboard.js?v=2"></script>
</body>
</html>
