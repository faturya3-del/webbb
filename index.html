<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GeoReport - Pengaduan Kriminalitas</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* Memastikan peta memenuhi area kontainernya */
        #map { width: 100%; height: 100%; }
        /* Kustomisasi scrollbar agar lebih rapi */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-hidden">

    <nav class="bg-slate-800 p-4 shadow-xl relative z-[1000] flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="img/logo-unp.png" alt="Logo" class="w-8 h-8 md:w-10 md:h-10">
            <div>
                <p class="text-white text-[10px] md:text-[12px] font-bold leading-tight">DIV Penginderaan Jauh & GIS</p>
                <p class="text-blue-300 text-[9px] md:text-[10px]">Sistem Informasi Geografis</p>
            </div>
        </div>

        <div class="hidden md:block absolute inset-x-0 top-1/2 -translate-y-1/2 text-center pointer-events-none">
            <h1 class="font-extrabold text-[16px] uppercase text-white tracking-widest">
                <span class="text-yellow-400">GeoReport</span> Pengaduan Kriminalitas
            </h1>
        </div>

        <div class="flex gap-2">
            <a href="dashboard.html" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-md text-xs transition">Dashboard Admin</a>
            <button id="btnLogin" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md text-xs font-bold transition">Login</button>
            <button id="btnLogout" class="hidden bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-md text-xs font-bold transition">Logout</button>
        </div>
    </nav>

    <div class="flex flex-col md:flex-row h-[calc(100vh-72px)] w-full">
        
        <div id="map" class="w-full h-[40%] md:h-full md:w-2/3 order-1 md:order-2 z-10 shadow-inner"></div>

        <div class="w-full h-[60%] md:h-full md:w-1/3 bg-white order-2 md:order-1 overflow-y-auto p-5 shadow-2xl border-t-4 md:border-t-0 md:border-r-4 border-yellow-400">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    📝 Form Pengaduan
                </h2>
                <span id="statusUser" class="text-[10px] bg-slate-100 px-2 py-1 rounded-full text-slate-600 font-medium italic">⚪ Status: Anonim</span>
            </div>

            <form id="formLaporan" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Nama Pelapor</label>
                    <input type="text" id="nama" placeholder="Nama Anda (Boleh Samaran)" class="w-full border-2 border-gray-200 p-2.5 rounded-lg focus:border-yellow-400 outline-none transition" required>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Wilayah/Daerah</label>
                        <input type="text" id="wilayah" placeholder="Contoh: Padang Barat" class="w-full border-2 border-gray-200 p-2.5 rounded-lg focus:border-yellow-400 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Kategori</label>
                        <select id="kategori" class="w-full border-2 border-gray-200 p-2.5 rounded-lg focus:border-yellow-400 outline-none" required>
                            <option value="">Pilih Kategori...</option>
                            <option value="Pencurian">Pencurian</option>
                            <option value="Perampokan">Perampokan</option>
                            <option value="Tawuran">Tawuran</option>
                            <option value="Vandalisme">Vandalisme</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Keterangan / Kronologi</label>
                    <textarea id="keterangan" rows="3" placeholder="Jelaskan detail kejadian..." class="w-full border-2 border-gray-200 p-2.5 rounded-lg focus:border-yellow-400 outline-none" required></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Bukti Foto</label>
                    <input type="file" id="foto" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-yellow-50 file:text-yellow-700 hover:file:bg-yellow-100">
                </div>

                <div class="bg-blue-50 p-3 rounded-xl border-2 border-blue-100">
                    <label class="block text-xs font-bold text-blue-800 uppercase mb-2">Lokasi Kejadian (Koordinat)</label>
                    <div class="flex gap-2">
                        <input type="text" id="lat" placeholder="Latitude" class="w-full bg-white border border-blue-200 p-2 rounded text-xs" readonly>
                        <input type="text" id="lng" placeholder="Longitude" class="w-full bg-white border border-blue-200 p-2 rounded text-xs" readonly>
                        <button type="button" id="btnLokasiRealtime" class="bg-blue-600 text-white px-3 py-2 rounded text-xs font-bold flex-shrink-0 hover:bg-blue-700 transition">📍 GPS</button>
                    </div>
                    <p class="text-[9px] text-blue-500 mt-2">*Klik pada peta atau gunakan tombol GPS</p>
                </div>

                <button type="submit" id="btnKirim" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95 uppercase tracking-widest">
                    Kirim Laporan
                </button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/map.js" defer></script>
</body>
</html>
